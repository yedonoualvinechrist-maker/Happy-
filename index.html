<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Joyeux Anniversaire 🎉</title>

<style>

body{
background: linear-gradient(135deg,#ff9acb,#ff6fa5);
font-family: Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:400px;
}

h1{
color:#ff4f8b;
font-size:32px;
}

p{
font-size:18px;
color:#555;
}

.birthday-image{
width:200px;
height:200px;
object-fit:cover;
border-radius:50%;
margin-bottom:20px;
border:5px solid #ff6fa5;
}

</style>

</head>

<body>

<div class="card">

<img src="IMG_20260304_195742_147.jpg" class="birthday-image">

<h1>Joyeux Anniversaire 🎂</h1>

<p>
Je te souhaite une journée remplie de joie,<br>
de bonheur et de beaux moments ❤️
</p>

<p>
Que cette nouvelle année de ta vie<br>
soit pleine de succès et d'amour.
</p>

<audio id="music" autoplay loop muted>
  <source src="Happy Birthday(MP3_160K).mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load", function(){
  var music = document.getElementById("music");
  music.muted = false;
  music.play();
});
</script>

</div>

</body>
</html>
